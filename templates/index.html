<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌟 Magical Storybook Generator 🌟</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-top">
                <h1>✨ Your Magical Bedtime Story ✨</h1>
                <a href="/settings" class="settings-button" title="Settings">⚙️</a>
            </div>
            <p class="subtitle">Pick a character to begin your adventure!</p>
            <div style="text-align:center;margin-top:12px;">
                <a href="/previous-stories" style="
                    display:inline-block;
                    padding:10px 24px;
                    border-radius:20px;
                    border:2px solid #667eea;
                    color:#667eea;
                    font-family:'Comic Sans MS',cursive;
                    font-weight:bold;
                    font-size:16px;
                    text-decoration:none;
                    transition:all 0.2s ease;
                " onmouseover="this.style.background='#f0f0ff'" onmouseout="this.style.background='transparent'">
                    📚 Previous Stories
                </a>
            </div>
        </div>

        <div class="picker-section">
            <!-- Character Selection -->
            <div class="picker-group">
                <h2>🦁 Pick a Character</h2>
                <div class="button-grid">
                    <button class="choice-btn" data-value="brave dragon">🐉 Dragon</button>
                    <button class="choice-btn" data-value="fluffy bunny">🐰 Bunny</button>
                    <button class="choice-btn" data-value="friendly robot">🤖 Robot</button>
                    <button class="choice-btn" data-value="kind princess">👑 Princess</button>
                    <button class="choice-btn" data-value="playful dinosaur">🦕 Dinosaur</button>
                    <button class="choice-btn" data-value="wise owl">🦉 Owl</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.querySelectorAll('.choice-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const character = btn.dataset.value;
                window.location.href = `/places?character=${encodeURIComponent(character)}`;
            });
        });
    </script>
</body>
</html>
