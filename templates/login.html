{% extends "base.html" %}

{% block page_title %}🔒 Login - Storybook Generator{% endblock %}

{% block body %}
<div class="login-wrapper">
    <div class="login-card">
        <div class="login-header">
            <div class="login-icon">📖</div>
            <h1>Storybook Generator</h1>
            <p class="login-subtitle">Enter your password to continue</p>
        </div>

        {% if error %}
        <div class="alert alert-danger login-error" role="alert">
            🔴 {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/login" class="login-form">
            <input type="hidden" name="next" value="{{ next }}">

            <div class="login-group mb-3">
                <label for="password" class="form-label">Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    class="form-control kid-input"
                    placeholder="Enter password..."
                    autocomplete="current-password"
                    autofocus
                >
            </div>

            <button type="submit" class="btn btn-primary login-btn w-100 kid-primary-btn">
                🔓 Unlock
            </button>
        </form>
    </div>
</div>
{% endblock %}
