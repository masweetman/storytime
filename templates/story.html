{% extends "base.html" %}

{% block page_title %}🌟 Your Bedtime Story 🌟{% endblock %}

{% block body_class %}story-page{% endblock %}

{% block body %}
<div class="story-container">
    <div class="story-header">
        <h1>📖 Your Magical Story 📖</h1>
        <p class="story-meta" id="story-meta"></p>
    </div>

    <div class="story-content">
        <div class="story-text-section">
            <p id="story-text" class="story-text"></p>
        </div>

        <div class="story-images" id="story-images"></div>
    </div>

    <div class="story-controls d-grid gap-3">
        <button id="read-aloud-btn" class="control-button btn btn-outline-primary w-100">
            🔊 Read to Me
        </button>
        <button id="pause-btn" class="control-button btn btn-outline-primary w-100 hidden">
            ⏸️ Pause
        </button>
        <button id="print-btn" class="control-button btn btn-outline-primary w-100">
            🖨️ Print Story
        </button>
        <button id="new-story-btn" class="control-button primary btn btn-primary w-100 kid-primary-btn">
            ✨ Create New Story ✨
        </button>
    </div>
</div>
{% endblock %}

{% block page_scripts %}
<script>
    const storyData = JSON.parse(sessionStorage.getItem('storyData') || '{}');

    if (!storyData.story) {
        window.location.href = '/';
    }

    document.getElementById('story-meta').textContent =
        `A story about a ${storyData.character} in a ${storyData.setting} 💜`;

    document.getElementById('story-text').textContent = storyData.story;

    const imagesContainer = document.getElementById('story-images');
    storyData.images.forEach((imagePath, index) => {
        const imgDiv = document.createElement('div');
        imgDiv.className = 'story-image';

        const loadingSpinner = document.createElement('div');
        loadingSpinner.className = 'image-loading';
        loadingSpinner.innerHTML = `
            <div class="image-spinner"></div>
            <p>Loading image ${index + 1}...</p>
        `;
        imgDiv.appendChild(loadingSpinner);

        const img = document.createElement('img');
        img.src = imagePath;
        img.alt = `Story illustration ${index + 1}`;

        img.onload = () => {
            imgDiv.innerHTML = '';
            imgDiv.appendChild(img);
        };

        img.onerror = () => {
            imgDiv.innerHTML = `
                <div class="image-error">
                    <p>📷 Image unavailable</p>
                    <small>Image generation may have failed. Try creating a new story!</small>
                </div>
            `;
        };

        console.log(`Loading image: ${imagePath}`);

        imagesContainer.appendChild(imgDiv);
    });

    const readAloudBtn = document.getElementById('read-aloud-btn');
    const pauseBtn = document.getElementById('pause-btn');
    const storyText = storyData.story;
    let audioPlayer = null;
    let audioUrl = null;

    function cleanupAudio() {
        if (audioPlayer) {
            audioPlayer.pause();
            audioPlayer.src = '';
            audioPlayer = null;
        }

        if (audioUrl) {
            URL.revokeObjectURL(audioUrl);
            audioUrl = null;
        }
    }

    function resetAudioControls() {
        readAloudBtn.disabled = false;
        readAloudBtn.textContent = '🔊 Read to Me';
        readAloudBtn.classList.remove('hidden');
        pauseBtn.textContent = '⏸️ Pause';
        pauseBtn.classList.add('hidden');
    }

    function stopAudio() {
        if (audioPlayer) {
            audioPlayer.pause();
            audioPlayer.currentTime = 0;
        }

        cleanupAudio();
        resetAudioControls();
    }

    async function startAudioPlayback() {
        readAloudBtn.disabled = true;
        readAloudBtn.textContent = '⏳ Loading...';

        try {
            const response = await fetch('/api/tts', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: storyText, story_id: storyData.story_id })
            });

            if (!response.ok) {
                let errorMessage = 'Unable to generate audio right now.';
                try {
                    const errorData = await response.json();
                    errorMessage = errorData.error || errorMessage;
                } catch (error) {
                    console.error('Failed to parse TTS error response:', error);
                }
                throw new Error(errorMessage);
            }

            const audioBlob = await response.blob();
            cleanupAudio();

            audioUrl = URL.createObjectURL(audioBlob);
            audioPlayer = new Audio(audioUrl);
            audioPlayer.addEventListener('ended', stopAudio);
            audioPlayer.addEventListener('error', stopAudio);

            await audioPlayer.play();

            readAloudBtn.classList.add('hidden');
            pauseBtn.textContent = '⏸️ Pause';
            pauseBtn.classList.remove('hidden');
        } catch (error) {
            console.error('Read-aloud failed:', error);
            cleanupAudio();
            resetAudioControls();
            alert(error.message || 'Unable to read the story aloud right now.');
        } finally {
            readAloudBtn.disabled = false;
            if (!audioPlayer) {
                readAloudBtn.textContent = '🔊 Read to Me';
            }
        }
    }

    readAloudBtn.addEventListener('click', () => {
        if (!audioPlayer) {
            startAudioPlayback();
        }
    });

    pauseBtn.addEventListener('click', async () => {
        if (!audioPlayer) {
            resetAudioControls();
            return;
        }

        if (audioPlayer.paused) {
            try {
                await audioPlayer.play();
                pauseBtn.textContent = '⏸️ Pause';
            } catch (error) {
                console.error('Failed to resume audio:', error);
                stopAudio();
            }
            return;
        }

        audioPlayer.pause();
        pauseBtn.textContent = '▶️ Resume';
    });

    document.getElementById('print-btn').addEventListener('click', () => {
        window.print();
    });

    document.getElementById('new-story-btn').addEventListener('click', () => {
        stopAudio();
        sessionStorage.removeItem('storyData');
        window.location.href = '/';
    });

    window.addEventListener('beforeunload', stopAudio);
</script>
{% endblock %}
